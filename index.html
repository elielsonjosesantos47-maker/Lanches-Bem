<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lanches Bem - Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #f0efef;
            --secondary: #f0eded;
            --dark-bg: #cc650a;
            --card-bg: #b84e07;
            --text: #fdf8f8;
            --text-muted: #fffbfb;
            --success: #28a745;
            --accent: #E1306C;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding-top: 160px;
            overflow-x: hidden;
        }

        header {
            position: fixed;
            top: 0; width: 100%;
            background: rgba(201, 66, 3, 0.98);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 2px solid var(--primary);
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { color: var(--primary); font-weight: 800; font-size: 1.4rem; display: flex; align-items: center; gap: 10px; }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .insta-link {
            color: var(--primary);
            font-size: 1.5rem;
            transition: 0.3s;
        }

        .insta-link:hover { color: var(--accent); }

        .cart-icon { position: relative; background: #222; padding: 10px; border-radius: 12px; cursor: pointer; transition: 0.3s; }
        #cart-badge { position: absolute; top: -5px; right: -5px; background: #fff; color: #000; font-size: 0.75rem; padding: 2px 7px; border-radius: 50%; font-weight: bold; }

        .category-nav {
            position: fixed;
            top: 85px; width: 100%;
            background: var(--dark-bg);
            padding: 15px;
            display: flex; gap: 12px;
            overflow-x: auto;
            z-index: 999;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        .cat-btn {
            background: var(--card-bg);
            color: var(--text-muted);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 20px;
            border-radius: 50px;
            white-space: nowrap;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .cat-btn.active { background: var(--primary); color: #b84e07; }

        main { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .menu-section {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 140px;
        }

        .product-info { display: flex; flex-direction: column; gap: 10px; height: 100%; }
        .product-title { font-size: 1.1rem; font-weight: 700; margin: 0; color: #fff; }
        .product-desc { font-size: 0.85rem; color: #eee; line-height: 1.4; margin: 0; }
        
        .product-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding-top: 15px; }
        .product-price { color: #fff; font-weight: 700; font-size: 1.1rem; }
        
        .btn-add { background: var(--primary); border: none; color: #b84e07; padding: 8px 18px; border-radius: 8px; font-weight: 700; cursor: pointer; }

        .cart-sidebar {
            position: fixed; right: -100%; top: 0;
            width: 100%; max-width: 400px; height: 100%;
            background: #1a1a1a; z-index: 2000;
            transition: 0.4s; display: flex; flex-direction: column;
        }
        .cart-sidebar.open { right: 0; }
        .cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; z-index: 1500; }
        
        .cart-items { flex: 1; overflow-y: auto; padding: 20px; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: #222; padding: 12px; border-radius: 8px; }
        
        .qty-btns { display: flex; align-items: center; gap: 10px; }
        .qty-btns button { background: #333; border: none; color: white; width: 25px; height: 25px; border-radius: 5px; cursor: pointer; }

        .cart-footer { padding: 20px; background: #111; overflow-y: auto; max-height: 80vh; }
        .checkout-form input, .checkout-form select, .checkout-form textarea {
            width: 100%; background: #222; border: 1px solid #333; padding: 10px; color: white; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; font-family: inherit; font-size: 0.9rem;
        }
        .checkout-form textarea { resize: none; height: 60px; }
        .btn-finalizar { background: #25d366; width: 100%; padding: 15px; border: none; border-radius: 10px; color: white; font-weight: 700; font-size: 1.1rem; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div id="status-loja" style="text-align:center; padding:5px; font-size: 0.85rem; font-weight:bold;"></div>
        <div class="header-container">
            <div class="logo"><i class="fa-solid fa-fire"></i> LANCHES BEM</div>
            <div class="header-actions">
                <a href="https://instagram.com/lanches_bem_mtz" target="_blank" class="insta-link"><i class="fa-brands fa-instagram"></i></a>
                <div class="cart-icon" onclick="toggleCart()">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span id="cart-badge">0</span>
                </div>
            </div>
        </div>
    </header>

    <nav class="category-nav">
        <button class="cat-btn active" onclick="filterMenu('todos', this)">Todos</button>
        <button class="cat-btn" onclick="filterMenu('Combos', this)">Combos</button>
        <button class="cat-btn" onclick="filterMenu('Burgers', this)">Burgers</button>
        <button class="cat-btn" onclick="filterMenu('Burgers Caseiros', this)">Burgers Caseiros</button>
        <button class="cat-btn" onclick="filterMenu('Passaportes', this)">Passaportes</button>
        <button class="cat-btn" onclick="filterMenu('Pasteis', this)">Pasteis</button>
        <button class="cat-btn" onclick="filterMenu('Porções', this)">Porções</button>
        <button class="cat-btn" onclick="filterMenu('Bebidas', this)">Bebidas</button>
    </nav>

    <main>
        <div class="menu-section" id="menu-container"></div>
    </main>

    <div id="cart-overlay" class="cart-overlay" onclick="toggleCart()"></div>
    
    <aside id="cart-sidebar" class="cart-sidebar">
        <div style="padding: 20px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center;">
            <h3 style="margin:0">Seu Carrinho</h3>
            <i class="fa-solid fa-xmark" onclick="toggleCart()" style="cursor:pointer; font-size: 1.5rem;"></i>
        </div>
        
        <div class="cart-items" id="cart-items"></div>

        <div class="cart-footer">
            <div style="display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: bold; font-size: 1.2rem;">
                <span>Total:</span>
                <span id="cart-total">R$ 0,00</span>
            </div>
            <div class="checkout-form">
                <input type="text" id="nome" placeholder="Seu Nome">
                <input type="text" id="endereco" placeholder="Endereço Completo">
                <input type="text" id="contato" placeholder="WhatsApp (DDD)">
                <textarea id="observacoes" placeholder="Observações (Ex: Sem cebola, ponto da carne, molho à parte...)"></textarea>
                <select id="pagamento">
                    <option value="Pix">Pix</option>
                    <option value="Cartão">Cartão (Maquininha)</option>
                    <option value="Dinheiro">Dinheiro</option>
                </select>
            </div>
            <button class="btn-finalizar" onclick="enviarWhatsApp()">
                <i class="fa-brands fa-whatsapp"></i> Enviar Pedido
            </button>
        </div>
    </aside>

    <script>
        const VALOR_MINIMO = 15.00;
        const HORARIO_FUNCIONAMENTO = { abre: 19, fecha: 23 };

        const produtos = [
            { id: 1, categoria: 'Burgers', nome: 'Topadão Duplo', preco: 52.90, desc: '4 hambúrguer, 4 salsichas, 4 ovos, 4 presunto, 4 queijo, bacon, frango desfiado, calabresa, cheddar, tomate e alface' },
            { id: 2, categoria: 'Burgers', nome: 'Topadão', preco: 39.90, desc: '2 hambúrguer, 2 salsichas, 2 ovos, 2 presunto, 2 queijo, bacon, frango desfiado, calabresa, cheddar, tomate e alface' },
            { id: 3, categoria: 'Burgers', nome: 'X - Tudo', preco: 18.90, desc: 'Hambúrguer, salsicha, ovo, presunto, queijo, bacon, calabresa, cheddar, tomate e alface' },
            { id: 4, categoria: 'Burgers', nome: 'X - bacon', preco: 18.90, desc: 'Hambúrguer, bacon, presunto, queijo, cheddar, tomate e alface' },
            { id: 5, categoria: 'Burgers', nome: 'Queijo Duplo', preco: 18.00, desc: 'Hambúrguer, 2 presunto, 2 queijo, tomate, alface e cheddar' },
            { id: 6, categoria: 'Burgers', nome: 'X - Frango', preco: 17.00, desc: 'Hambúrguer, frango desfiado, milho com ervilha, queijo, presunto, tomate, alface e cheddar' },
            { id: 7, categoria: 'Burgers', nome: 'X - Calabresa', preco: 17.00, desc: 'Hambúrguer, calabresa, presunto, queijo, tomate, alface e cheddar' },
            { id: 8, categoria: 'Burgers', nome: 'Minuano', preco: 17.00, desc: 'Hambúrguer, ovo, presunto, queijo, tomate, alface e cheddar' },
            { id: 9, categoria: 'Burgers', nome: 'X - Burguer', preco: 13.00, desc: 'Hambúrguer, presunto, queijo, tomate, alface e cheddar' },
            { id: 10, categoria: 'Burgers', nome: 'Americano', preco: 11.00, desc: 'Presunto, queijo, ovo, tomate, alface e cheddar' },
            { id: 11, categoria: 'Burgers', nome: 'Misto Quente', preco: 8.00, desc: 'Presunto, queijo e cheddar' },
            { id: 12, categoria: 'Burgers Caseiros', nome: 'X - Tudo Caseiro', preco: 22.00, desc: 'Caseiro, salsicha, ovo, presunto, queijo, bacon, calabresa, cheddar, tomate e alface' },
            { id: 13, categoria: 'Burgers Caseiros', nome: 'X - Bacon Caseiro', preco: 20.00, desc: 'Hambúrguer caseiro, bacon, presunto, queijo, cheddar, tomate e alface' },
            { id: 14, categoria: 'Burgers Caseiros', nome: 'X - Burguer Caseiro', preco: 16.90, desc: 'Hambúrguer caseiro, presunto, queijo, tomate, alface e cheddar' },
            { id: 15, categoria: 'Passaportes', nome: 'Passaporte de Carne', preco: 14.00, desc: 'Carne moída, salsicha, milho e ervilha' },
            { id: 16, categoria: 'Passaportes', nome: 'Passaporte de Frango', preco: 14.00, desc: 'Frango desfiado, salsicha, milho e ervilha' },
            { id: 17, categoria: 'Passaportes', nome: 'Passaporte de Misto', preco: 16.00, desc: 'Carne e frango, salsicha, milho e ervilha' },
            { id: 18, categoria: 'Porções', nome: 'Batata Frita Grande', preco: 23.90, desc: 'Batata frita, calabresa e cheddar' },
            { id: 19, categoria: 'Porções', nome: 'Batata Frita Pequena', preco: 11.00, desc: 'Batata frita e cheddar' },
            { id: 20, categoria: 'Porções', nome: 'Batata Frita Minizinha', preco: 6.00, desc: 'Batata frita, ketchup e queijo ralado' },
            { id: 21, categoria: 'Pasteis', nome: 'Pastel de Carne', preco: 6.00, desc: 'Recheio de carne moída' },
            { id: 22, categoria: 'Pasteis', nome: 'Pastel de Frango', preco: 6.00, desc: 'Recheio de frango desfiado' },
            { id: 23, categoria: 'Pasteis', nome: 'Pastel de Queijo', preco: 6.00, desc: 'Recheio de queijo coalho derretido' },
            { id: 24, categoria: 'Pasteis', nome: 'Pastel de Misto', preco: 6.00, desc: 'Recheio de presunto e queijo' },
            { id: 25, categoria: 'Pasteis', nome: 'Pastel de Frango com Queijo', preco: 8.00, desc: 'Frango desfiado com queijo coalho' },
            { id: 26, categoria: 'Pasteis', nome: 'Pastel de Carne com Queijo', preco: 8.00, desc: 'Carne moída com queijo coalho ' },
            { id: 27, categoria: 'Bebidas', nome: 'Coca - Cola em lata 350ml', preco: 5.00, desc: 'Lata 350ml' },
            { id: 28, categoria: 'Bebidas', nome: 'Caçulinha', preco: 3.00, desc: 'Refrigerante caçulinha' },
            { id: 29, categoria: 'Bebidas', nome: 'Pepsi 1L', preco: 7.00, desc: 'Garrafa 1 Litro' },
            { id: 30, categoria: 'Bebidas', nome: 'Antartica 1L', preco: 7.00, desc: 'Guaraná Antarctica 1 Litro' },
            { id: 31, categoria: 'Bebidas', nome: 'Coca - Cola 2L', preco: 12.00, desc: 'Garrafa 2 Litros' },
            { id: 32, categoria: 'Bebidas', nome: 'Fanta Laranja 2L', preco: 12.00, desc: 'Garrafa 2 Litros' },
            { id: 33, categoria: 'Bebidas', nome: 'Pepsi 2L', preco: 10.00, desc: 'Garrafa 2 Litros' },
            { id: 34, categoria: 'Bebidas', nome: 'Antartica 2L', preco: 10.00, desc: 'Guaraná Antarctica 2 Litros' },
            { id: 35, categoria: 'Combos', nome: 'Combo Topadão Individual', preco: 49.90, desc: 'Acompanha topadão normal, batata mini e refrigerante pequeno' },
            { id: 36, categoria: 'Combos', nome: 'Combo X-burguer + Batata Mini + Caçulinha', preco: 21.90, desc: 'X-burguer padrão, batata mini e um refrigerante caçulinha' },
            { id: 37, categoria: 'Combos', nome: 'Combo X-Tudo + Batata Pequena + Refri em Lata', preco: 32.90, desc: 'X-Tudo completo, batata frita pequena e refri em lata 350ml' },
            { id: 38, categoria: 'Combos', nome: 'Combo 2 X-Frango + Batata Grande', preco: 52.90, desc: '2 sanduíches X-Frango e uma porção de batata frita grande' },
        ];

        let carrinho = [];

        function lojaAberta() {
            const hora = new Date().getHours();
            return hora >= HORARIO_FUNCIONAMENTO.abre && hora < HORARIO_FUNCIONAMENTO.fecha;
        }

        function filterMenu(cat, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderizar(cat);
        }

        function renderizar(categoria = 'todos') {
            const container = document.getElementById('menu-container');
            const filtrados = categoria === 'todos' ? produtos : produtos.filter(p => p.categoria === categoria);
            
            container.innerHTML = filtrados.map(p => `
                <div class="product-card">
                    <div class="product-info">
                        <h4 class="product-title">${p.nome}</h4>
                        <p class="product-desc">${p.desc}</p>
                    </div>
                    <div class="product-bottom">
                        <span class="product-price">R$ ${p.preco.toFixed(2).replace('.',',')}</span>
                        <button class="btn-add" onclick="adicionarAoCarrinho(${p.id})">Adicionar</button>
                    </div>
                </div>
            `).join('');
        }

        function adicionarAoCarrinho(id) {
            const item = carrinho.find(i => i.id === id);
            if (item) item.qtd++;
            else carrinho.push({ ...produtos.find(p => p.id === id), qtd: 1 });
            atualizarInterface();
        }

        function alterarQtd(id, delta) {
            const index = carrinho.findIndex(i => i.id === id);
            if (index !== -1) {
                carrinho[index].qtd += delta;
                if (carrinho[index].qtd <= 0) carrinho.splice(index, 1);
            }
            atualizarInterface();
        }

        function atualizarInterface() {
            const totalItens = carrinho.reduce((sum, item) => sum + item.qtd, 0);
            document.getElementById('cart-badge').innerText = totalItens;

            const itemsCont = document.getElementById('cart-items');
            itemsCont.innerHTML = carrinho.map(i => `
                <div class="cart-item">
                    <div>
                        <div style="font-weight:600; color: white;">${i.nome}</div>
                        <div style="color:#25d366; font-size:0.9rem">R$ ${(i.preco * i.qtd).toFixed(2).replace('.',',')}</div>
                    </div>
                    <div class="qty-btns">
                        <button onclick="alterarQtd(${i.id}, -1)">-</button>
                        <span>${i.qtd}</span>
                        <button onclick="alterarQtd(${i.id}, 1)">+</button>
                    </div>
                </div>
            `).join('');

            const totalValor = carrinho.reduce((sum, item) => sum + (item.preco * item.qtd), 0);
            document.getElementById('cart-total').innerText = `R$ ${totalValor.toFixed(2).replace('.',',')}`;
        }

        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('open');
            const overlay = document.getElementById('cart-overlay');
            overlay.style.display = overlay.style.display === 'block' ? 'none' : 'block';
        }

        function enviarWhatsApp() {
            const nome = document.getElementById('nome').value;
            const endereco = document.getElementById('endereco').value;
            const contato = document.getElementById('contato').value;
            const obs = document.getElementById('observacoes').value;
            const pag = document.getElementById('pagamento').value;
            const total = carrinho.reduce((sum, item) => sum + (item.preco * item.qtd), 0);

            if (!lojaAberta()) {
                alert("🔴 A loja está fechada agora. Funcionamos das 19h às 23h!");
                return;
            }

            if (!nome || !endereco || !contato || carrinho.length === 0) {
                alert("Preencha todos os dados e adicione itens ao carrinho!");
                return;
            }

            if (total < VALOR_MINIMO) {
                alert(`O valor mínimo para entrega é R$ ${VALOR_MINIMO.toFixed(2).replace('.',',')}`);
                return;
            }

            let msg = `*NOVO PEDIDO - LANCHES BEM*\n\n`;
            msg += `*Cliente:* ${nome}\n`;
            msg += `*Endereço:* ${endereco}\n`;
            msg += `*Contato:* ${contato}\n\n`;
            
            msg += `*ITENS:*\n`;
            carrinho.forEach(i => {
                msg += `✅ ${i.qtd}x ${i.nome} - R$ ${(i.preco * i.qtd).toFixed(2).replace('.',',')}\n`;
            });

            if(obs) {
                msg += `\n*OBSERVAÇÕES:* ${obs}\n`;
            }

            msg += `\n*TOTAL: R$ ${total.toFixed(2).replace('.',',')}*`;
            msg += `\n*Pagamento:* ${pag}`;

            window.open(`https://wa.me/5582991675574?text=${encodeURIComponent(msg)}`);
        }

        function atualizarStatusLoja() {
            const statusDiv = document.getElementById("status-loja");
            if (lojaAberta()) {
                statusDiv.innerHTML = "🟢 ABERTO AGORA";
                statusDiv.style.background = "#28a745";
                statusDiv.style.color = "#fff";
            } else {
                statusDiv.innerHTML = "🔴 FECHADO - ABRIMOS ÀS 19H";
                statusDiv.style.background = "#dc3545";
                statusDiv.style.color = "#fff";
            }
        }

        renderizar();
        atualizarStatusLoja();
        setInterval(atualizarStatusLoja, 60000);
    </script>
</body>
</html>
