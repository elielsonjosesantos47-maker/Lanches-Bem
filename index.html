<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lanches Bem - Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #f0efef;
            --secondary: #f0eded;
            --dark-bg: #cc650a;
            --card-bg: #b84e07;
            --text: #fdf8f8;
            --text-muted: #fffbfb;
            --success: #fcfafa;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding-top: 150px;
            overflow-x: hidden;
        }

        /* HEADER */
        header {
            position: fixed;
            top: 0; width: 100%;
            background: rgba(201, 66, 3, 0.98);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 2px solid var(--primary);
            <div id="status-loja" style="text-align:center; padding:10px; font-weight:bold;"></div>
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { color: var(--primary); font-weight: 800; font-size: 1.4rem; display: flex; align-items: center; gap: 10px; }

        .cart-icon { position: relative; background: #222; padding: 12px; border-radius: 12px; cursor: pointer; transition: 0.3s; }
        .cart-icon:active { transform: scale(0.9); }
        #cart-badge { position: absolute; top: -5px; right: -5px; background: var(--primary); font-size: 0.75rem; padding: 2px 8px; border-radius: 50%; font-weight: bold; border: 2px solid var(--dark-bg); }

        /* NAVEGAÇÃO */
        .category-nav {
            position: fixed;
            top: 78px; width: 100%;
            background: var(--dark-bg);
            padding: 15px;
            display: flex; gap: 20px;
            overflow-x: auto;
            z-index: 999;
            border-bottom: 1px solid #222;
        }
        .category-nav::-webkit-scrollbar { display: none; }
        .cat-btn {
            background: var(--card-bg);
            color: var(--text-muted);
            border: 1px solid #333;
            padding: 10px 25px;
            border-radius: 70px;
            white-space: nowrap;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            transition: 0.3s;
        }
        .cat-btn.active { background: var(--primary); color: rgb(17, 16, 16); border-color: var(--primary); box-shadow: 0 0 15px rgba(4, 4, 4, 0.3); }

        /* PRODUTOS */
        main { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .menu-section {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: 16px;
            display: flex;
            padding: 15px;
            gap: 15px;
            border: 1px solid #010101;
            transition: 0.3s;
        }
        .product-card:hover { border-color: var(--primary); }

        .product-img { width: 100px; height: 100px; border-radius: 12px; object-fit: cover; background: #222; }

        .product-info { flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .product-title { font-size: 1.1rem; font-weight: 600; margin: 0; color: var(--secondary); }
        .product-desc { font-size: 0.8rem; color: var(--text-muted); margin: 5px 0; line-height: 1.3; }
        
        .product-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .product-price { color: var(--success); font-weight: 700; font-size: 1.1rem; }
        
        .btn-add { background: var(--primary); border: none; color: rgb(6, 146, 6); padding: 10px 18px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-add:active { transform: scale(0.95); }

        /* CARRINHO LATERAL */
        .cart-sidebar {
            position: fixed; right: -100%; top: 0;
            width: 100%; max-width: 450px; height: 100%;
            background: #121212; z-index: 2000;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column;
            box-shadow: -10px 0 30px rgba(0,0,0,0.7);
        }
        .cart-sidebar.open { right: 0; }
        .cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 1500; }
        
        .cart-header { padding: 25px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .cart-items { flex: 1; overflow-y: auto; padding: 20px; }
        
        .cart-item { display: flex; justify-content: space-between; align-items: center; background: #1a1a1a; padding: 12px; border-radius: 10px; margin-bottom: 10px; }
        .qty-btns { display: flex; align-items: center; gap: 12px; background: #222; padding: 5px 12px; border-radius: 8px; }
        .qty-btns button { background: none; border: none; color: var(--primary); font-size: 1.3rem; font-weight: bold; cursor: pointer; }

        .cart-footer { padding: 25px; background: #0a0a0a; border-top: 1px solid #222; }
        .total-row { display: flex; justify-content: space-between; font-size: 1.3rem; font-weight: 700; margin-bottom: 20px; color: var(--secondary); }

        .checkout-form input, .checkout-form select {
            width: 100%; background: #1a1a1a; border: 1px solid #333; padding: 12px; color: white; border-radius: 8px; margin-bottom: 12px; font-family: inherit;
        }
        .btn-finalizar { background: var(--success); width: 100%; padding: 18px; border: none; border-radius: 12px; color: rgb(2, 181, 8); font-weight: 700; font-size: 1.1rem; cursor: pointer; transition: 0.3s; }
        .btn-finalizar:hover { filter: brightness(1.1); }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <div class="logo"><i class="fa-solid fa-fire"></i> LANCHES BEM</div>
            <div class="cart-icon" onclick="toggleCart()">
                <i class="fa-solid fa-cart-shopping"></i>
                <span id="cart-badge">0</span>
            </div>
        </div>
    </header>

    <nav class="category-nav">
        <button class="cat-btn active" onclick="filterMenu('todos', this)">Todos</button>
        <button class="cat-btn" onclick="filterMenu('Combos', this)">Combos</button>
        <button class="cat-btn" onclick="filterMenu('Burgers', this)">Burgers</button>
        <button class="cat-btn" onclick="filterMenu('Burgers Caseiros', this)">Burgers Caseiros</button>
        <button class="cat-btn" onclick="filterMenu('Passaportes', this)">Passaportes</button>
        <button class="cat-btn" onclick="filterMenu('Pasteis', this)">Pasteis</button>
        <button class="cat-btn" onclick="filterMenu('Porções', this)">Porções</button>
        <button class="cat-btn" onclick="filterMenu('Bebidas', this)">Bebidas</button>
    </nav>

    <main>
        <div class="menu-section" id="menu-container">
            </div>
    </main>

    <div id="cart-overlay" class="cart-overlay" onclick="toggleCart()"></div>
    
    <aside id="cart-sidebar" class="cart-sidebar">
        <div class="cart-header">
            <h3>Seu Carrinho</h3>
            <i class="fa-solid fa-xmark" onclick="toggleCart()" style="cursor:pointer; font-size: 1.5rem;"></i>
        </div>
        
        <div class="cart-items" id="cart-items">
            </div>

        <div class="cart-footer">
            <div class="total-row">
                <span>Total:</span>
                <span id="cart-total">R$ 0,00</span>
            </div>
            <div class="checkout-form">
                <input type="text" id="nome" placeholder="Seu Nome">
                <input type="text" id="endereco" placeholder="Endereço de Entrega">
                <input type="text" id="contato" placeholder="Contato">
                <select id="pagamento">
                    <option value="Pix">Pix</option>
                    <option value="Cartão de Crédito/Débito">Cartão (Maquininha)</option>
                    <option value="Dinheiro">Dinheiro</option>
                </select>
            </div>
            <button class="btn-finalizar" onclick="enviarWhatsApp()">
                <i class="fa-brands fa-whatsapp"></i> Enviar Pedido
            </button>
        </div>
    </aside>

    <script>
        const produtos = [
            { id: 1, categoria: 'Burgers', nome: 'Topadão Duplo', preco: 52.90, desc: 'Pão brioche, 2 smash 90g, cheddar e bacon.'},
            { id: 2, categoria: 'Burgers', nome: 'Topadão', preco: 39.90, desc: 'Frango crocante, alface e maionese verde.'},
            { id: 3, categoria: 'Burgers', nome: 'X - Tudo', preco: 18.90, desc: 'Original 350ml gelada.'},
            { id: 4, categoria: 'Burgers', nome: 'X - bacon', preco: 18.90, desc: 'Laranja ou Limão 400ml.'},
            { id: 5, categoria: 'Burgers', nome: 'Queijo Duplo', preco: 18.00, desc: 'pao, hamburgues, presunto.'},
            { id: 6, categoria: 'Burgers', nome: 'X - Frango', preco: 17.00, desc: 'Pão brioche, 2 smash 90g, cheddar e bacon.'},
            { id: 7, categoria: 'Burgers', nome: 'X - Calabresa', preco: 17.00, desc: 'Frango crocante, alface e maionese verde.'},
            { id: 8, categoria: 'Burgers', nome: 'Minuano', preco: 17.00, desc: 'Original 350ml gelada.'},
            { id: 9, categoria: 'Burgers', nome: 'X - Burguer', preco: 13.00, desc: 'Laranja ou Limão 400ml.'},
            { id: 10, categoria: 'Burgers', nome: 'Americano', preco: 11.00, desc: 'pao, hamburgues, presunto.'},
            { id: 11, categoria: 'Burgers', nome: 'Misto Quente', preco: 8.00, desc: 'Frango crocante, alface e maionese verde.'},
            { id: 12, categoria: 'Burgers Caseiros', nome: 'X - Tudo Caseiro', preco: 22.00, desc: 'Original 350ml gelada.'},
            { id: 13, categoria: 'Burgers Caseiros', nome: 'X - Bacon Caseiro', preco: 20.00, desc: 'Laranja ou Limão 400ml.'},
            { id: 14, categoria: 'Burgers Caseiros', nome: 'X - Burguer Caseiro', preco: 16.90, desc: 'pao, hamburgues, presunto.'},
            { id: 15, categoria: 'Passaportes', nome: 'Passaporte de Carne', preco: 14.00, desc: 'Laranja ou Limão 400ml.'},
            { id: 16, categoria: 'Passaportes', nome: 'Passaporte de Frango', preco: 14.00, desc: 'pao, hamburgues, presunto.'},
            { id: 17, categoria: 'Passaportes', nome: 'Passaporte de Misto', preco: 16.00, desc: 'Laranja ou Limão 400ml.'},
            { id: 18, categoria: 'Porções', nome: 'Batata Frita Grande', preco: 23.90, desc: 'Pão brioche, 2 smash 90g, cheddar e bacon.'},
            { id: 19, categoria: 'Porções', nome: 'Batata Frita Pequena', preco: 11.00, desc: 'Frango crocante, alface e maionese verde.'},
            { id: 20, categoria: 'Porções', nome: 'Batata Frita Minizinha', preco: 6.00, desc: 'Original 350ml gelada.'},
            { id: 21, categoria: 'Pasteis', nome: 'Pastel de Carne', preco: 6.00, desc: 'Laranja ou Limão 400ml.'},
            { id: 22, categoria: 'Pasteis', nome: 'Pastel de Frango', preco: 6.00, desc: 'pao, hamburgues, presunto.'},
            { id: 23, categoria: 'Pasteis', nome: 'Pastel de Queijo', preco: 6.00, desc: 'Laranja ou Limão 400ml.'},
            { id: 24, categoria: 'Pasteis', nome: 'Pastel de Misto', preco: 6.00, desc: 'pao, hamburgues, presunto.'},
            { id: 25, categoria: 'Pasteis', nome: 'Pastel de Frango com Queijo', preco: 8.00, desc: 'Laranja ou Limão 400ml.'},
            { id: 26, categoria: 'Pasteis', nome: 'Pastel de Carne com Queijo', preco: 8.00, desc: 'pao, hamburgues, presunto.'},
            { id: 27, categoria: 'Bebidas', nome: 'Coca - Cola em lata 350ml', preco: 5.00, desc: 'Laranja ou Limão 400ml.'},
            { id: 28, categoria: 'Bebidas', nome: 'Caçulinha', preco: 3.00, desc: 'pao, hamburgues, presunto.'},
            { id: 29, categoria: 'Bebidas', nome: 'Pepsi 1L', preco: 7.00, desc: 'Laranja ou Limão 400ml.'},
            { id: 30, categoria: 'Bebidas', nome: 'Antartica 1L', preco: 7.00, desc: 'pao, hamburgues, presunto.'},
            { id: 31, categoria: 'Bebidas', nome: 'Coca - Cola 2L', preco: 12.00, desc: 'Laranja ou Limão 400ml.'},
            { id: 32, categoria: 'Bebidas', nome: 'Fanta Laranja 2L', preco: 12.00, desc: 'pao, hamburgues, presunto.'},
            { id: 33, categoria: 'Bebidas', nome: 'Pepsi 2L', preco: 10.00, desc: 'Laranja ou Limão 400ml.'},
            { id: 34, categoria: 'Bebidas', nome: 'Antartica 2L', preco: 10.00, desc: 'pao, hamburgues, presunto.'},
            { id: 35, categoria: 'Combos', nome: 'Combo Topadão Individual', preco: 9.00, desc: 'Laranja ou Limão 400ml.'},
            { id: 36, categoria: 'Combos', nome: 'Combo X-burguer + Batata Mini + Caçulinha', preco: 21.90, desc: 'Laranja ou Limão 400ml.'},
            { id: 37, categoria: 'Combos', nome: 'Combo X-Tudo + Batata Pequena + Refri em Lata', preco: 32.90, desc: 'Laranja ou Limão 400ml.'},
            { id: 38, categoria: 'Combos', nome: 'Combo 2 X-Frango + Batata Grande', preco: 52.90, desc: 'Laranja ou Limão 400ml.'},
    
        ];

        let carrinho = [];

        function filterMenu(cat, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderizar(cat);
        }

        function renderizar(categoria = 'todos') {
            const container = document.getElementById('menu-container');
            const filtrados = categoria === 'todos' ? produtos : produtos.filter(p => p.categoria === categoria);
            
            container.innerHTML = filtrados.map(p => `
                <div class="product-card">
                                        <div class="product-info">
                        <div>
                            <h4 class="product-title">${p.nome}</h4>
                            <p class="product-desc">${p.desc}</p>
                        </div>
                        <div class="product-bottom">
                            <span class="product-price">R$ ${p.preco.toFixed(2).replace('.',',')}</span>
                            <button class="btn-add" onclick="adicionarAoCarrinho(${p.id})">Adicionar</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function adicionarAoCarrinho(id) {
            const itemExistente = carrinho.find(item => item.id === id);
            if (itemExistente) {
                itemExistente.qtd++;
            } else {
                const p = produtos.find(p => p.id === id);
                carrinho.push({ ...p, qtd: 1 });
            }
            atualizarInterface();
        }

        function alterarQtd(id, delta) {
            const index = carrinho.findIndex(item => item.id === id);
            if (index !== -1) {
                carrinho[index].qtd += delta;
                if (carrinho[index].qtd <= 0) carrinho.splice(index, 1);
            }
            atualizarInterface();
        }

        function atualizarInterface() {
            // Atualiza Badge
            const totalItens = carrinho.reduce((sum, item) => sum + item.qtd, 0);
            document.getElementById('cart-badge').innerText = totalItens;

            // Atualiza Lista do Carrinho
            const itemsCont = document.getElementById('cart-items');
            itemsCont.innerHTML = carrinho.map(i => `
                <div class="cart-item">
                    <div>
                        <div style="font-weight:600">${i.nome}</div>
                        <div style="color:var(--success); font-size:0.9rem">R$ ${(i.preco * i.qtd).toFixed(2).replace('.',',')}</div>
                    </div>
                    <div class="qty-btns">
                        <button onclick="alterarQtd(${i.id}, -1)">-</button>
                        <span>${i.qtd}</span>
                        <button onclick="alterarQtd(${i.id}, 1)">+</button>
                    </div>
                </div>
            `).join('');

            // Atualiza Total
            const totalValor = carrinho.reduce((sum, item) => sum + (item.preco * item.qtd), 0);
            document.getElementById('cart-total').innerText = `R$ ${totalValor.toFixed(2).replace('.',',')}`;
        }

        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('open');
            const overlay = document.getElementById('cart-overlay');
            overlay.style.display = overlay.style.display === 'block' ? 'none' : 'block';
        }

        function enviarWhatsApp()
        if (!lojaAberta()) {
    alert("Estamos fechados no momento. Funcionamos das 19h às 23h.");
    return;
}
        {
            const nome = document.getElementById('nome').value;
            const endereco = document.getElementById('endereco').value;
            const contato = document.getElementById('contato').value;
            const pag = document.getElementById('pagamento').value;

            if (!nome || !endereco || !contato || carrinho.length === 0) {
                alert("Por favor, preencha nome, contato, endereço e adicione itens!");
                return;
            }

            let msg = `*NOVO PEDIDO - LANCHES BEM*\n\n`;
            msg += `*Cliente:* ${nome}\n`;
            msg += `*Endereço:* ${endereco}\n\n`;
            msg += `*Contato:* ${contato}\n`;
                        msg += `*ITENS:*\n`;
            
            carrinho.forEach(i => {
                msg += `✅ ${i.qtd}x ${i.nome} - R$ ${(i.preco * i.qtd).toFixed(2)}\n`;
            });

            const total = carrinho.reduce((sum, item) => sum + (item.preco * item.qtd), 0);
            msg += `\n*TOTAL: R$ ${total.toFixed(2)}*`;
            msg += `\n*Pagamento:* ${pag}`;
            if (total < VALOR_MINIMO) {
    alert(`Pedido mínimo é de R$ ${VALOR_MINIMO.toFixed(2).replace('.',',')}`);
    return;
}

            const numero = "5582991675574"; // COLOQUE SEU NÚMERO AQUI
            window.open(`https://wa.me/${numero}?text=${encodeURIComponent(msg)}`);
        }

        renderizar();

        function atualizarStatusLoja() {
    const statusDiv = document.getElementById("status-loja");

    if (lojaAberta()) {
        statusDiv.innerHTML = "🟢 Estamos Abertos!";
        statusDiv.style.background = "#1f8b4c";
        statusDiv.style.color = "#fff";
    } else {
        statusDiv.innerHTML = "🔴 Estamos Fechados. Funcionamos das 19h às 23h.";
        statusDiv.style.background = "#8b1f1f";
        statusDiv.style.color = "#fff";
    }
}

atualizarStatusLoja();
        
    </script>
</body>

</html>
